name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift-test:
    name: Swift Tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Swift Version
        run: swift --version

      - name: Check Shell Scripts
        run: |
          bash -n deploy.sh
          bash -n release.sh

      - name: Run Tests
        run: swift test

      - name: Build Release
        run: swift build -c release -Xswiftc -Osize
