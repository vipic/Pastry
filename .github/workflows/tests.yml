name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift-test:
    name: Swift Tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Swift Version
        run: swift --version

      - name: Check Shell Scripts
        run: |
          bash -n deploy.sh
          bash -n release.sh
          bash -n smoke.sh
          bash -n populate_clipboard.sh
          bash -n bench.sh
          bash -n scripts/check_coverage.sh

      - name: Run Tests With Coverage
        run: swift test --enable-code-coverage

      - name: Check Coverage
        run: scripts/check_coverage.sh 20

      - name: Build Release
        run: swift build -c release -Xswiftc -Osize
