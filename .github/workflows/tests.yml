name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift-test:
    name: Swift Tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Swift Version
        run: swift --version

      - name: Check Shell Scripts
        run: |
          bash -n deploy.sh
          bash -n release.sh
          bash -n smoke.sh
          bash -n populate_clipboard.sh
          bash -n bench.sh
          bash -n scripts/check_coverage.sh
          bash -n scripts/check_design_tokens.sh
          bash -n scripts/diagnostics.sh
          bash -n scripts/lib/command_log.sh
          bash -n scripts/next_version.sh
          bash -n .mise/tasks/release
          bash -n .mise/tasks/release-auto
          bash -n .mise/tasks/publish

      - name: Check Design Tokens
        run: scripts/check_design_tokens.sh

      - name: Run Tests With Coverage
        run: swift test --enable-code-coverage

      - name: Check Coverage
        run: scripts/check_coverage.sh 20

      - name: Build Release
        run: swift build -c release -Xswiftc -Osize
