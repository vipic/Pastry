name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift-test:
    name: Swift Tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Swift Version
        run: swift --version

      - name: Check Shell Scripts
        run: scripts/check_shell.sh

      - name: Check Design Tokens
        run: scripts/check_design_tokens.sh

      - name: Run Tests With Coverage
        run: swift test --enable-code-coverage

      - name: Check Coverage
        run: scripts/check_coverage.sh 20

      - name: Build Release
        run: swift build -c release -Xswiftc -Osize
