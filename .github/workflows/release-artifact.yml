name: Release Artifact

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.3.15"
        required: true

jobs:
  build-dmg:
    name: Build DMG
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build Release DMG
        run: ./release.sh "${{ inputs.version }}" --force

      - name: Upload DMG
        uses: actions/upload-artifact@v5
        with:
          name: Pastry-${{ inputs.version }}.dmg
          path: dist/Pastry-${{ inputs.version }}.dmg
          if-no-files-found: error
